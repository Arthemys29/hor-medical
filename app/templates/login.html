<!DOCTYPE html>
<html lang="fr" class="h-full">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion — SecureData Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .login-card {
            box-shadow: 0 20px 60px rgba(0, 0, 0, .12), 0 4px 16px rgba(0, 0, 0, .08);
        }

        .input-field {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: .875rem;
            background: #f8fafc;
            transition: all .2s ease;
            outline: none;
        }

        .input-field:focus {
            border-color: #1558a0;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(21, 88, 160, .12);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: .875rem;
            letter-spacing: .02em;
            background: linear-gradient(135deg, #1558a0 0%, #1d6fb8 100%);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: all .2s ease;
            box-shadow: 0 4px 14px rgba(21, 88, 160, .3);
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(21, 88, 160, .4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .fade-up {
            animation: fadeUp .5s ease forwards;
        }

        .cross-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%231558a0' fill-opacity='0.06'%3E%3Cpath d='M16 0h8v16h16v8H24v16h-8V24H0v-8h16V0z'/%3E%3C/g%3E%3C/svg%3E");
        }
    </style>
</head>

<body class="h-full bg-slate-50" style="background: linear-gradient(135deg,#f0f7ff 0%,#e8f4fd 50%,#f0f7ff 100%)">

    <div class="cross-pattern absolute inset-0 pointer-events-none"></div>

    <div class="min-h-screen flex items-center justify-center p-4 relative">
        <div class="w-full max-w-md fade-up">

            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4"
                    style="background: linear-gradient(135deg, #0f2c5c 0%, #1558a0 100%); box-shadow: 0 8px 24px rgba(21,88,160,.35)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" class="w-8 h-8">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                        <path d="M12 8v4M10 10h4" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">SecureData Monitor</h1>
                <p class="text-slate-500 text-sm mt-1">Système de Gestion Médicale Sécurisé</p>
            </div>

            <!-- Card -->
            <div class="login-card bg-white rounded-2xl p-8">

                {% if error %}
                <div class="mb-5 p-3.5 rounded-xl bg-red-50 border border-red-200 flex items-center gap-3">
                    <svg class="w-5 h-5 text-red-500 flex-shrink-0" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="15" y1="9" x2="9" y2="15" />
                        <line x1="9" y1="9" x2="15" y2="15" />
                    </svg>
                    <p class="text-red-700 text-sm font-medium">{{ error }}</p>
                </div>
                {% endif %}

                <form method="post" action="/login" autocomplete="off" novalidate>
                    <div class="space-y-5">

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1.5">Identifiant</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                                        <circle cx="12" cy="7" r="4" />
                                    </svg>
                                </span>
                                <input type="text" name="username" class="input-field pl-10"
                                    placeholder="Votre identifiant" required autofocus />
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1.5">Mot de passe</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <rect x="3" y="11" width="18" height="11" rx="2" />
                                        <path d="M7 11V7a5 5 0 0110 0v4" />
                                    </svg>
                                </span>
                                <input type="password" name="password" id="pwd" class="input-field pl-10 pr-10"
                                    placeholder="••••••••" required />
                                <button type="button" onclick="togglePwd()"
                                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                    <svg id="eye-icon" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
                                        stroke="currentColor" stroke-width="2">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                        <circle cx="12" cy="12" r="3" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn-login mt-2">
                            Connexion sécurisée
                        </button>
                    </div>
                </form>

                <div class="mt-6 pt-5 border-t border-slate-100">
                    <p class="text-center text-xs font-semibold text-400 mt-2">Utilisateurs Démo</p>
                    <div class="grid grid-cols-3 gap-2 text-center">
                        <div class="p-2.5">
                            <p class="text-amber-700 font-semibold text-xs">directeur</p>
                            <code class="text-amber-600 text-xs mt-0.5">Directeur@123</code>
                        </div>
                        <div class="p-2.5">
                            <p class="text-red-700 font-semibold text-xs">soc</p>
                            <code class="text-red-600 text-xs mt-0.5">Soc@123</code>
                        </div>
                        <div class="p-2.5">
                            <p class="text-green-700 font-semibold text-xs">infirmier1</p>
                            <code class="text-green-600 text-xs mt-0.5">Infirmier@123</code>
                        </div>
                    </div>
                </div>
            </div>

            <p class="text-center text-xs text-slate-400 mt-6">
                © 2025 SecureData Monitor · Système protégé — Accès réservé au personnel autorisé
            </p>
        </div>
    </div>

    <script>
        function togglePwd() {
            const f = document.getElementById('pwd');
            f.type = f.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>

</html>
